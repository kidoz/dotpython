name: Native ABI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-abi3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANYVER_MACOS_ARM64_SHA256: '0f2fa90663b0203d3086c313d6384a6d74177e1f52508abf613cb17439edc4f9'
  ANYVER_MACOS_ARM64_URL: 'https://files.pythonhosted.org/packages/17/b2/bc88c1b3900fbd213fb95ae8904ac574a8e28e4899b67eaa835bc7011c4b/anyver-1.1.0-cp311-abi3-macosx_11_0_arm64.whl'
  ANYVER_SOURCE_REVISION: '3dc892e3eb9d1a4baf7a315a6ce4a41b3893337e'
  ANYVER_TEST_SHA256: '9432cc519e7caa01295df0ec83c4f37ad246073c0841a1ca58578a281552fe6e'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'
  PYTEST_VERSION: '9.1.1'

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            expected_kernel: Linux
            expected_architecture: x86_64
            bridge: libdotpython_abi3.so
          - name: macOS ARM64
            os: macos-15
            expected_kernel: Darwin
            expected_architecture: arm64
            bridge: libdotpython_abi3.dylib

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Check out the pinned Anyver source
        if: runner.os == 'macOS'
        uses: actions/checkout@v6
        with:
          repository: kidoz/anyver
          ref: ${{ env.ANYVER_SOURCE_REVISION }}
          path: build/anyver-source

      - name: Install qualification Python
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          architecture: arm64

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301

      - name: Verify toolchain and runner
        env:
          EXPECTED_KERNEL: ${{ matrix.expected_kernel }}
          EXPECTED_ARCHITECTURE: ${{ matrix.expected_architecture }}
        run: |
          test "$(uname -s)" = "$EXPECTED_KERNEL"
          test "$(uname -m)" = "$EXPECTED_ARCHITECTURE"
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version
          dotnet --info

      - name: Download the pinned Anyver acceptance wheel
        if: runner.os == 'macOS'
        run: |
          wheel="$RUNNER_TEMP/anyver-1.1.0-cp311-abi3-macosx_11_0_arm64.whl"
          curl --fail --location --retry 3 --output "$wheel" "$ANYVER_MACOS_ARM64_URL"
          actual=$(shasum -a 256 "$wheel" | awk '{ print $1 }')
          test "$actual" = "$ANYVER_MACOS_ARM64_SHA256"
          echo "DOTPYTHON_ANYVER_WHEEL=$wheel" >> "$GITHUB_ENV"

      - name: Verify the pinned Anyver suite
        if: runner.os == 'macOS'
        run: |
          source_root="$PWD/build/anyver-source"
          test "$(git -C "$source_root" rev-parse HEAD)" = "$ANYVER_SOURCE_REVISION"
          actual=$(shasum -a 256 "$source_root/tests/test_anyver.py" | awk '{ print $1 }')
          test "$actual" = "$ANYVER_TEST_SHA256"
          python -m pip install --disable-pip-version-check "pytest==$PYTEST_VERSION"
          echo "DOTPYTHON_ANYVER_SOURCE=$source_root" >> "$GITHUB_ENV"
          echo "DOTPYTHON_ANYVER_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Check native formatting
        run: cargo fmt --manifest-path native/dotpython-abi3/Cargo.toml --all -- --check

      - name: Run Clippy
        run: >-
          cargo clippy
          --manifest-path native/dotpython-abi3/Cargo.toml
          --workspace
          --all-targets
          --
          -D warnings

      - name: Test the Cargo workspace
        run: cargo test --manifest-path native/dotpython-abi3/Cargo.toml --workspace

      - name: Build, verify, and stage the native ABI targets
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            native/dotpython-abi3/prepare-anyver-acceptance.sh \
              "$DOTPYTHON_ANYVER_WHEEL" build/native-abi3
            ANYVER_MODULE="$PWD/build/native-abi3/anyver._anyver.abi3.so" \
              native/dotpython-abi3/build.sh build/native-abi3
          else
            native/dotpython-abi3/build.sh build/native-abi3
          fi

      - name: Build the worker tests and staged native artifacts
        run: dotnet build tests/DotPython.WorkerTests/DotPython.WorkerTests.csproj --configuration Release

      - name: Verify the staged native artifact allowlist
        env:
          BRIDGE: ${{ matrix.bridge }}
        run: |
          native_directory=tests/DotPython.WorkerTests/bin/Release/net10.0/native
          test -d "$native_directory"
          expected=$(printf '%s\n' \
            anyver-symbol-manifest.json \
            dotpython_fixture.abi3.so \
            dotpython_fixture_failure.abi3.so \
            dotpython_fixture_secondary.abi3.so \
            "$BRIDGE" \
            native_anyver_test \
            native_fixture_test \
            secondary-symbol-manifest.json \
            symbol-manifest.json | LC_ALL=C sort)
          if [ "$RUNNER_OS" = "macOS" ]; then
            expected=$(printf '%s\n%s\n' "$expected" anyver._anyver.abi3.so | LC_ALL=C sort)
          fi
          actual=$(find "$native_directory" -maxdepth 1 -type f -exec basename {} \; | LC_ALL=C sort)
          test "$actual" = "$expected"

      - name: Run the worker tests
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            dotnet run \
              --project tests/DotPython.WorkerTests/DotPython.WorkerTests.csproj \
              --configuration Release \
              --no-build \
              -- -failSkips
          else
            dotnet run \
              --project tests/DotPython.WorkerTests/DotPython.WorkerTests.csproj \
              --configuration Release \
              --no-build
          fi

      - name: Validate package qualification evidence
        run: >-
          dotnet run
          --project tests/DotPython.PackageCompatibilityTests/DotPython.PackageCompatibilityTests.csproj
          --configuration Release
          -- -noColor
