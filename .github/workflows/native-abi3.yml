name: Native ABI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-abi3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            expected_kernel: Linux
            expected_architecture: x86_64
            bridge: libdotpython_abi3.so
          - name: macOS ARM64
            os: macos-15
            expected_kernel: Darwin
            expected_architecture: arm64
            bridge: libdotpython_abi3.dylib

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301

      - name: Verify toolchain and runner
        env:
          EXPECTED_KERNEL: ${{ matrix.expected_kernel }}
          EXPECTED_ARCHITECTURE: ${{ matrix.expected_architecture }}
        run: |
          test "$(uname -s)" = "$EXPECTED_KERNEL"
          test "$(uname -m)" = "$EXPECTED_ARCHITECTURE"
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version
          dotnet --info

      - name: Check native formatting
        run: cargo fmt --manifest-path native/dotpython-abi3/Cargo.toml --all -- --check

      - name: Run Clippy
        run: >-
          cargo clippy
          --manifest-path native/dotpython-abi3/Cargo.toml
          --workspace
          --all-targets
          --
          -D warnings

      - name: Test the Cargo workspace
        run: cargo test --manifest-path native/dotpython-abi3/Cargo.toml --workspace

      - name: Build, verify, and stage the native ABI targets
        run: native/dotpython-abi3/build.sh build/native-abi3

      - name: Build the worker tests and staged native artifacts
        run: dotnet build tests/DotPython.WorkerTests/DotPython.WorkerTests.csproj --configuration Release

      - name: Verify the staged native artifact allowlist
        env:
          BRIDGE: ${{ matrix.bridge }}
        run: |
          native_directory=tests/DotPython.WorkerTests/bin/Release/net10.0/native
          test -d "$native_directory"
          expected=$(printf '%s\n' \
            anyver-symbol-manifest.json \
            dotpython_fixture.abi3.so \
            dotpython_fixture_failure.abi3.so \
            "$BRIDGE" \
            native_anyver_test \
            native_fixture_test \
            symbol-manifest.json | LC_ALL=C sort)
          actual=$(find "$native_directory" -maxdepth 1 -type f -exec basename {} \; | LC_ALL=C sort)
          test "$actual" = "$expected"

      - name: Run the worker tests
        run: >-
          dotnet run
          --project tests/DotPython.WorkerTests/DotPython.WorkerTests.csproj
          --configuration Release
          --no-build
